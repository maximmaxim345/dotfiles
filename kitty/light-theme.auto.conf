# vim:ft=kitty

## name: Dotfiles Light Auto
## author: OpenAI Codex
## blurb: Light theme used when the OS prefers a light color scheme.

#: The basic colors

foreground #2f343f
background #f7f7f7
selection_foreground #2f343f
selection_background #d8dee9


#: Cursor colors

cursor #2a7bde
cursor_text_color #f7f7f7


#: URL underline color when hovering with mouse

url_color #0b63ce


#: kitty window border colors and terminal bell colors

active_border_color #7a8599
inactive_border_color #d8dee9
bell_border_color #2a7bde
visual_bell_color none


#: OS Window titlebar colors

wayland_titlebar_color #e9edf2
macos_titlebar_color #e9edf2


#: Tab bar colors

active_tab_foreground #f7f7f7
active_tab_background #2f343f
inactive_tab_foreground #4d5566
inactive_tab_background #e9edf2
tab_bar_background #e9edf2
tab_bar_margin_color none


#: Colors for marks (marked text in the terminal)

mark1_foreground #f7f7f7
mark1_background #2a7bde
mark2_foreground #f7f7f7
mark2_background #5d6b82
mark3_foreground #f7f7f7
mark3_background #2f8f6b


#: The basic 16 colors

#: black
color0 #2f343f
color8 #6b7280

#: red
color1 #c2474b
color9 #d06063

#: green
color2 #2f8f6b
color10 #3ba37b

#: yellow
color3 #8b6f00
color11 #a07f00

#: blue
color4 #2a7bde
color12 #4b91e2

#: magenta
color5 #8b5cf6
color13 #9f78f8

#: cyan
color6 #0f8b8d
color14 #27a2a4

#: white
color7 #d8dee9
color15 #ffffff
